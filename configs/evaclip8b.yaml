experiment:
  name: "eva_clip_8b_448"
  output_dir: "outputs"

runtime:
  batch_size: 2
  workers: 8
  epochs: 2
  precision: "bf16"
  save_freq: 10
  log_every_n_steps: 5

data:
  train_image_root: "REPLACE_WITH_IMAGE_ROOT"
  image_size: 448

model:
  name: "BAAI/EVA-CLIP-8B-448"
  wrapper: "evaclip8b"
  lora: "linear_r-8"

method:
  # register params
  reg_factor: 32
  register_type: "zero"

  # FP-GP filter params
  fp_gp_thres: 0.5

  # adaptive register params
  adaptive_register_thres: 0.55

  # AH filter params
  disable_attention_hijack_filter: false
  attention_hijack_layer_start: 10
  attention_hijack_layer_end: 15
  attention_hijack_thres: 0.5

  # InfoNCE params
  disable_student_teacher_matching: true
  uniformity_strength: 1.0

optimizer:
  name: "adamw"
  lr: 1.0e-4
  lr_last: 0.0
  wd: 0.1
  warmup: 0
  scheduler: "const"

logging:
  wandb: false
  wandb_mode: "offline"
