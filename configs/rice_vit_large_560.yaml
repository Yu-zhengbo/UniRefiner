experiment:
  name: "rice_vit_large_patch14_560"
  output_dir: "outputs"

runtime:
  batch_size: 16
  workers: 8
  epochs: 2
  precision: "bf16"

data:
  train_image_root: "REPLACE_WITH_IMAGE_ROOT"
  image_size: 560

model:
  name: "DeepGlint-AI/rice-vit-large-patch14-560"
  wrapper: "rice_vit"
  lora: "linear_r-8"

method:
  # register params
  reg_factor: 32
  register_type: "zero"

  # FP-GP filter params
  fp_gp_thres: 0.5

  # adaptive register params
  adaptive_register_thres: 0.55

  # AH filter params
  disable_attention_hijack_filter: false
  attention_hijack_layer_start: 9
  attention_hijack_layer_end: 11
  attention_hijack_thres: 0.5

  # InfoNCE params
  uniformity_strength: 0.3

optimizer:
  name: "adamw"
  lr: 1.0e-4
  lr_last: 0.0
  wd: 0.1
  warmup: 0
  scheduler: "const"

logging:
  wandb: false
  wandb_mode: "offline"
